<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Acceso — Carl's Jr.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="auth.css">
  
</head>

<body class="auth-page">

<div class="auth-header">
  <img src="imagenes/CarlsLogo.png" class="logo center">
  <p class="sub">Operado por Cero Tenedor</p>
</div>

<div class="auth-container">
  <div class="auth-card">
    <h2>Acceso</h2>
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          autocomplete="email"
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

    <div class="auth-options">
        <label class="remember-label">
          <input type="checkbox" id="recordarme" />
          <span>Recordarme</span>
        </label>
      </div>

    <button onclick="login()">Entrar</button>
    <button class="secondary" onclick="irRegistro()">Registrarse</button>

    <p class="security">
      Acceso exclusivo para personal autorizado<br>
      Uso interno únicamente
    </p>
  </div>
</div>

<footer>
  © 2026 Cero Tenedor, AGRUPACION RINCON MORALES S de RL de CV <br>
  Plataforma interna de capacitación.
</footer>

<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
